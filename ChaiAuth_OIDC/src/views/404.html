<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChaiAuth | 404 Not Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap');

        :root {
            --black: #0a0a0a;
            --white: #f5f0e8;
            --red: #d62828;
            --red-dark: #8b0000;
            --blue: #1a3a6b;
            --yellow: #f4d03f;
            --gray: #1a1a1a;
            --gray2: #242424;
            --gray3: #2e2e2e;
            --muted: #6b6b6b;
            --border: #2e2e2e;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Geometric background */
        .geo-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .geo-circle-lg {
            position: absolute;
            top: -300px;
            left: -200px;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            border: 1px solid rgba(26, 58, 107, 0.2);
        }

        .geo-circle-md {
            position: absolute;
            bottom: -150px;
            right: -100px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: var(--blue);
            opacity: 0.08;
        }

        .geo-bar-h {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--border);
            opacity: 0.5;
        }

        .geo-bar-v {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            background: var(--border);
            opacity: 0.3;
        }

        .geo-rect {
            position: absolute;
            top: 20%;
            right: 10%;
            width: 120px;
            height: 120px;
            border: 1px solid rgba(214, 40, 40, 0.15);
            transform: rotate(15deg);
        }

        .geo-dot-grid {
            position: absolute;
            bottom: 10%;
            left: 5%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 18px;
        }

        .geo-dot-grid span {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.25;
            display: block;
        }

        /* Nav */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 64px;
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo-mark {
            width: 32px;
            height: 32px;
            background: var(--red);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-logo-mark::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background: var(--yellow);
        }

        .nav-logo-mark svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        .nav-name {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
        }

        /* Main */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
        }

        .error-code {
            font-size: clamp(120px, 20vw, 200px);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.85;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .error-code .num-4 {
            color: var(--white);
        }

        .error-code .num-0 {
            color: var(--red);
            position: relative;
            display: inline-block;
        }

        .error-code .num-0::before {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 4px solid rgba(214, 40, 40, 0.2);
        }

        .error-divider {
            width: 48px;
            height: 3px;
            background: var(--red);
            margin: 0 auto 32px;
        }

        .error-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 16px;
        }

        .error-desc {
            font-size: 15px;
            color: var(--muted);
            line-height: 1.65;
            margin-bottom: 48px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            padding: 12px 28px;
        }

        .btn-primary {
            background: var(--red);
            color: var(--white);
            border: 1px solid var(--red);
        }

        .btn-primary:hover {
            background: #b71c1c;
            border-color: #b71c1c;
        }

        .btn-outline {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--muted);
            color: var(--white);
        }

        /* Error meta */
        .error-meta {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 32px;
            justify-content: center;
        }

        .meta-item {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .meta-item span {
            color: var(--white);
        }

        /* Animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            animation: fadeUp 0.5s ease both;
        }

        .error-divider {
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .error-title {
            animation: fadeUp 0.5s 0.15s ease both;
        }

        .error-desc {
            animation: fadeUp 0.5s 0.2s ease both;
        }

        .error-actions {
            animation: fadeUp 0.5s 0.25s ease both;
        }

        .error-meta {
            animation: fadeUp 0.5s 0.35s ease both;
        }

        @media (max-width: 600px) {
            nav {
                padding: 0 24px;
            }

            main {
                padding: 32px 24px;
            }

            .error-actions {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <div class="geo-bg">
        <div class="geo-circle-lg"></div>
        <div class="geo-circle-md"></div>
        <div class="geo-bar-h"></div>
        <div class="geo-bar-v"></div>
        <div class="geo-rect"></div>
        <div class="geo-dot-grid">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <nav>
        <a href="/" class="nav-brand">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            <span class="nav-name">ChaiAuth</span>
        </a>
    </nav>

    <main>
        <div class="error-container">
            <div class="error-code">
                <span class="num-4">4</span><span class="num-0">0</span><span class="num-4">4</span>
            </div>
            <div class="error-divider"></div>
            <div class="error-title">Page Not Found</div>
            <p class="error-desc">
                The resource you requested doesn't exist or has been moved.
                Double-check the URL or navigate back to somewhere safe.
            </p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">← Back to Home</a>
                <a href="/dashboard" class="btn btn-outline">Dashboard</a>
            </div>
            <div class="error-meta">
                <div class="meta-item">Status: <span>404</span></div>
                <div class="meta-item">Error: <span>NOT_FOUND</span></div>
                <div class="meta-item">Path: <span id="pathDisplay">—</span></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('pathDisplay').textContent = window.location.pathname || '—';
    </script>
</body>

</html>
