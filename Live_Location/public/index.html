<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIVETRACK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <span class="wordmark">LIVETRACK</span>
    </div>
    <div class="header-center">
      <div class="stat-block">
        <span class="stat-val" id="user-count">0</span>
        <span class="stat-label">ONLINE</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-block">
        <span class="stat-val" id="next-update">—</span>
        <span class="stat-label">NEXT UPDATE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="conn-pill" id="conn-pill" data-state="off">
        <span class="conn-dot"></span>
        <span id="conn-text">OFFLINE</span>
      </div>
      <div id="auth-area"></div>
    </div>
  </header>

  <div id="map"></div>

  <div id="sidebar">
    <div class="sidebar-title">USERS</div>
    <div id="user-list"></div>
  </div>

  <div id="location-bar" class="hidden">
    <span id="location-status">Waiting for location…</span>
    <button id="btn-share" class="btn btn-primary">SHARE LOCATION</button>
    <button id="btn-stop" class="btn hidden">STOP SHARING</button>
  </div>

  <div id="toast-root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
