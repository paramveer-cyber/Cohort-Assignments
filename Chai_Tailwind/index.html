<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai CSS Engine Docs</title>
</head>

<body class="chai-bg-[#020617] chai-text-[#e2e8f0] chai-m-0">

    <!-- NAV -->
    <nav class="chai-flexbetween chai-p-4 chai-bg-[#020617] chai-b chai-bc-[#1e293b] chai-shadowmd">
        <h1 class="chai-bold chai-fs-4 chai-text-white">☕ Chai Docs</h1>
        <div class="chai-flex chai-gap-2">
            <button class="chai-btn chai-bg-[#0f172a] chai-b chai-bc-[#334155] chai-text-white">Login</button>
            <button class="chai-btn chai-bg-[#f97316] chai-text-white">Signup</button>
        </div>
    </nav>

    <div class="chai-container chai-mt-4">

        <!-- HERO -->
        <section class="chai-carddark chai-mb-4 chai-center chai-bg-[#0f172a] chai-b chai-bc-[#1e293b] chai-shadowlg">

            <h2 class="chai-fs-5 chai-bold chai-mb-2 chai-text-white">
                Build Docs at Chai Speed 🚀
            </h2>

            <p class="chai-text-[#94a3b8] chai-mb-3">
                Utility-first CSS… but now it actually looks premium.
            </p>

            <button class="chai-btn chai-bg-[#f97316] chai-m-1">Get Started</button>
            <button class="chai-btn chai-bg-[#1e293b] chai-m-1 chai-text-white">Docs</button>
        </section>

    </div>

    <!-- DOCS -->
    <div class="chai-container chai-mt-4" id="docs"></div>

    <script type="module">
        import "https://unpkg.com/chai-css-engine@1.0.10/index.js";

        const sections = {

            colors: ["red", "black", "white", "gray", "blue", "green", "yellow", "purple", "pink", "orange"],

            typography: [
                "center", "left", "right", "justify",
                "bold", "italic",
                "underline", "linethrough",
                "upper", "lower", "capitalize"
            ],

            display: ["block", "inline", "inlineblock", "hidden", "visible"],

            position: ["relative", "absolute", "fixed", "sticky"],

            overflow: [
                "overflowhidden", "overflowauto", "overflowscroll",
                "overflowxhidden", "overflowyhidden",
                "overflowxauto", "overflowyauto"
            ],

            cursor: ["pointer", "notallowed", "grab", "crosshair", "move"],

            whitespace: ["nowrap", "wrap", "pre", "ellipsis"],

            bordersQuick: ["border", "border0"],

            backgroundHelpers: [
                "bgcover", "bgcontain",
                "bgcenter", "bgtop", "bgbottom",
                "bgleft", "bgright",
                "norepeat", "repeat"
            ],

            flex: [
                "flex", "flexcol", "flexrow",
                "flexcenter", "flexbetween", "flexaround",
                "flexwrap", "flexnowrap",
                "flex1", "flexauto",
                "justifycenter", "justifybetween", "justifyaround",
                "justifyend", "justifystart",
                "itemscenter", "itemsstart", "itemsend", "itemsstretch"
            ],

            effects: ["shadow", "shadowmd", "shadowlg", "shadowxl", "round"],

            misc: ["transparent", "selectnone", "selectall", "invisible", "pointernone", "pointerauto"],

            components: [
                "btn", "card", "carddark",
                "badge", "input", "inputdark",
                "container",
                "divider", "dividerdark",
                "circle"
            ],

            grid: ["grid2", "grid3", "grid4"],

            spacingProps: [
                "m", "mt", "mb", "ml", "mr", "mx", "my",
                "p", "pt", "pb", "pl", "pr", "px", "py"
            ],

            sizing: ["w", "h", "minw", "minh", "maxw", "maxh"],

            typographyProps: ["fs", "fontw", "fw", "lh", "ls"],

            borderProps: ["b", "bw", "bc", "bs", "br", "radius", "bt", "bb", "bl", "brd"],

            positioningProps: ["pos", "top", "left", "right", "bottom", "inset", "z"],

            layoutProps: ["jc", "ai", "gap", "grow", "shrink", "basis", "wrap"],

            effectsProps: ["shadow", "opacity"],

            media: ["fit", "aspect"],

            overflowProps: ["overflow", "overflowx", "overflowy"],

            interaction: ["cursor", "select"],

            outline: ["outline", "outlinew", "outlinec"],

            background: ["bg", "bgc", "bgsize", "bgpos", "bgimg", "bgr"],

            transforms: ["translatex", "translatey", "scale", "rotate"],

            transitions: ["transition", "duration", "ease"],

            box: ["box"]
        };

        function createCode(text) {
            const el = document.createElement("code");

            // 🔥 upgraded chips (depth + contrast)
            el.className = "chai-bg-[#020617] chai-p-1 chai-br-2 chai-center chai-b chai-bc-[#1e293b] chai-text-[#fb923c] chai-shadowmd";

            el.textContent = text;
            return el;
        }

        const root = document.getElementById("docs");

        Object.entries(sections).forEach(([title, items], index) => {

            const section = document.createElement("section");

            // 🔥 alternating subtle panel shades
            const shades = ["#0f172a", "#111827"];
            section.className = "chai-mb-4 chai-p-3 chai-br-3 chai-b chai-bc-[#1e293b] chai-shadowmd";
            section.style.background = shades[index % shades.length];

            const heading = document.createElement("h2");

            const orange = ["#f97316", "#fb923c", "#fdba74"];
            heading.className = "chai-bold chai-fs-4 chai-mb-2";
            heading.style.color = orange[index % orange.length];

            heading.textContent = title;

            const container = document.createElement("div");
            container.className = "chai-grid chai-gap-1 chai-grid4";

            items.forEach(item => {

                if (
                    title.includes("Props") ||
                    ["background", "transforms", "transitions", "box", "layoutProps", "positioningProps", "sizing", "borderProps", "typographyProps", "effectsProps", "overflowProps", "interaction", "outline"].includes(title)
                ) {
                    container.appendChild(createCode(`chai-${item}-2`));
                    container.appendChild(createCode(`chai-${item}-[value]`));
                } else {
                    container.appendChild(createCode(`chai-${item}`));
                }

            });

            section.appendChild(heading);
            section.appendChild(container);
            root.appendChild(section);
        });
    </script>

</body>

</html>
